<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Modern - Glassmorphism</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan ikon dari Font Awesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>
    <div class="background-animation"></div>
    <div class="login-container">
        <form class="login-form" id="loginForm">
    <h2>Silahkan Login</h2>
    <p>Silakan masuk ke akun Anda</p>
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Nama Pengguna" required>
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required>
    </div>
    <div class="options">
        <label><input type="checkbox"> Ingat saya</label>
        <a href="#">Lupa password?</a>
    </div>
    <button type="submit" class="login-btn">Masuk</button>
    <div class="register-link">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
        <div class="kanan"><i class="fab fa-google"></i> Google</div>
    </div>
    <button type="button" onclick="location.href='../index.html';">Home</button>
    <div id="alertBox" class="alert" style="display:none;"></div>
</form>
<script src="js/login.js"></script>   
</body>
</html>
